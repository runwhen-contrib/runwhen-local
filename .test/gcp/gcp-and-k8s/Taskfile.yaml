version: "3"

tasks:
  default:
    desc: "Generate workspaceInfo and rebuild/test"
    cmds:
      - task: generate-rwl-config-basic
      - task: build-rwl
      - task: run-rwl-discovery

  clean:
    desc: "Run cleanup tasks"
    cmds:
      - task: clean-rwl-discovery

  generate-rwl-config-detailed:
    desc: "Generate RunWhen Local configuration (workspaceInfo.yaml)"
    env:
      RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace"}}'
    cmds:
      - |
        # Generate workspaceInfo.yaml with fetched cluster details
        cat <<EOF > workspaceInfo.yaml
        workspaceName: "$RW_WORKSPACE"
        workspaceOwnerEmail: authors@runwhen.com
        defaultLocation: location-01
        defaultLOD: detailed
        cloudConfig:
          kubernetes:             
            kubeconfigFile: /shared/kubeconfig.secret
            contexts:
              sandbox-cluster-1: 
                defaultNamespaceLOD: detailed
          gcp:
            applicationCredentialsFile: /shared/gcp.secret
            projects:
            - runwhen-nonprod-sandbox
            projectLevelOfDetails:
              runwhen-nonprod-sandbox: detailed
        codeCollections: []
        # codeCollections: 
        #   - repoURL: "https://github.com/runwhen-contrib/rw-cli-codecollection"
        #     branch: "main"
        #     codeBundles: ["k8s-namespace-healthcheck", "k8s-deployment-healthcheck"]
        custom: 
          kubernetes_distribution_binary: kubectl
        EOF
    silent: true

  generate-rwl-config-basic:
    desc: "Generate RunWhen Local configuration (workspaceInfo.yaml)"
    env:
      RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace"}}'
    cmds:
      - |
        # Generate workspaceInfo.yaml with fetched cluster details
        cat <<EOF > workspaceInfo.yaml
        workspaceName: "$RW_WORKSPACE"
        workspaceOwnerEmail: authors@runwhen.com
        defaultLocation: location-01
        defaultLOD: detailed
        cloudConfig:
          kubernetes:             
            kubeconfigFile: /shared/kubeconfig.secret
            contexts:
              sandbox-cluster-1: 
                defaultNamespaceLOD: basic
          gcp:
            applicationCredentialsFile: /shared/gcp.secret
            projects:
            - runwhen-nonprod-sandbox
            projectLevelOfDetails:
              runwhen-nonprod-sandbox: basic
        codeCollections: []
        # useLocalGit: true
        # codeCollections: 
        #   - repoURL: "https://github.com/runwhen-contrib/rw-cli-codecollection"
        #     branch: "main"
        #     codeBundles: ["k8s-namespace-healthcheck", "k8s-deployment-healthcheck"]
        custom: 
          kubernetes_distribution_binary: kubectl
        EOF
    silent: true

  build-rwl:
    desc: "Build RWL test image"
    cmds:
      - |
        BUILD_DIR=../../../src/
        CONTAINER_NAME="RunWhenLocal"
        if docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Stopping and removing existing container $CONTAINER_NAME..."
          docker stop $CONTAINER_NAME && docker rm $CONTAINER_NAME
        elif docker ps -a -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Removing existing stopped container $CONTAINER_NAME..."
          docker rm $CONTAINER_NAME || echo "Container removal failed, continuing..." || echo "Container removal failed, continuing..."
        else
          echo "No existing container named $CONTAINER_NAME found."
        fi
        
        echo "Cleaning up output directory..."
        rm -rf output || { echo "Failed to remove output directory"; exit 1; }
        mkdir output && chmod 777 output || { echo "Failed to set permissions"; exit 1; }
        ## Building Container Image
        docker buildx build --builder mybuilder --platform linux/amd64  --build-arg INCLUDE_CODE_COLLECTION_CACHE=true -t runwhen-local:test -f $BUILD_DIR/Dockerfile $BUILD_DIR --load

        ## Use this if you need to test both arm64/amd64 builds
        # docker buildx build --builder mybuilder --platform linux/amd64,linux/arm64  -t runwhen-local:test -f $BUILD_DIR/Dockerfile $BUILD_DIR

    silent: true


  run-rwl-discovery:
    desc: "Run RunWhen Local Discovery on test infrastructure"
    cmds:
      - |
        rm slx_count.txt || true
        CONTAINER_NAME="RunWhenLocal"    
        if docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Stopping and removing existing container $CONTAINER_NAME..."
          docker stop $CONTAINER_NAME && docker rm $CONTAINER_NAME
        elif docker ps -a -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Removing existing stopped container $CONTAINER_NAME..."
          docker rm $CONTAINER_NAME || echo "Container removal failed, continuing..."
        else
          echo "No existing container named $CONTAINER_NAME found."
        fi
        
        echo "Cleaning up output directory..."
        rm -rf output || { echo "Failed to remove output directory"; exit 1; }
        mkdir output && chmod 777 output || { echo "Failed to set permissions"; exit 1; }

        echo "Starting new container $CONTAINER_NAME..."

        docker run -e DEBUG_LOGGING=false --name $CONTAINER_NAME -p 8000:8000 -v $(pwd):/shared -d runwhen-local:test || {
          echo "Failed to start container"; exit 1;
        }

        # Wait for the REST service to actually come up. If uvicorn crashes on
        # startup the container exits; dump its logs so the Python traceback is
        # visible in CI instead of an opaque "Error executing script". Without
        # this, a startup crash produced no artifact at all.
        echo "Waiting for workspace builder REST service..."
        rest_ready=0
        for i in $(seq 1 30); do
          if ! docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
            echo "Container $CONTAINER_NAME exited during startup. Logs:"
            docker logs $CONTAINER_NAME 2>&1 | tee container_logs.log
            exit 1
          fi
          if docker exec $CONTAINER_NAME curl -sf http://localhost:8000/info/ >/dev/null 2>&1; then
            rest_ready=1; break
          fi
          sleep 2
        done
        if [ "$rest_ready" -ne 1 ]; then
          echo "REST service never became ready. Container logs:"
          docker logs $CONTAINER_NAME 2>&1 | tee container_logs.log
          exit 1
        fi

        echo "Running workspace builder script in container..."
        # pipefail so a run.sh failure is NOT masked by tee's exit code.
        set -o pipefail
        docker exec -w /workspace-builder $CONTAINER_NAME ./run.sh $1 --verbose 2>&1 | tee run_sh_output.log || {
          echo "Error executing script in container. Container logs:"
          docker logs $CONTAINER_NAME 2>&1 | tee container_logs.log
          exit 1
        }
        set +o pipefail
        # Always snapshot the container (REST/indexer) logs for the asserts +
        # the failure artifact.
        docker logs $CONTAINER_NAME > container_logs.log 2>&1 || true

        echo "Review generated config files under output/workspaces/"
        total_slxs=$(find $(find 'output/' -type d -name 'slxs') -mindepth 1 -type d | wc -l)
        echo "Total SLXs: $total_slxs"
        echo "$total_slxs" > slx_count.txt
    silent: true

  ci-run-rwl-discovery:
    desc: "Run RunWhen Local Discovery on test infrastructure"
    cmds:
      - |
        rm slx_count.txt || true
        CONTAINER_NAME="RunWhenLocal"    
        if docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Stopping and removing existing container $CONTAINER_NAME..."
          docker stop $CONTAINER_NAME && docker rm $CONTAINER_NAME
        elif docker ps -a -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Removing existing stopped container $CONTAINER_NAME..."
          docker rm $CONTAINER_NAME || echo "Container removal failed, continuing..."
        else
          echo "No existing container named $CONTAINER_NAME found."
        fi
        
        echo "Cleaning up output directory..."
        rm -rf output || { echo "Failed to remove output directory"; exit 1; }
        mkdir output && chmod 777 output || { echo "Failed to set permissions"; exit 1; }
        chmod 777 . 
        echo "Starting new container $CONTAINER_NAME..."
        echo "User $(whoami)"
        # 1. Start container in the background
        docker run -d \
          -e DEBUG_LOGS=true \
          --name "$CONTAINER_NAME" \
          -p 8000:8000 \
          -v "$(pwd):/shared" \
          runwhen-local:test

        # 2. Follow the main container logs in the background (if you care about them)
        docker logs -f "$CONTAINER_NAME" &

        # 3. Now exec the script. Its stdout goes to your pipeline.
        #    By default, docker exec prints to the current terminal/session.
        docker exec -w /workspace-builder "$CONTAINER_NAME" ./run.sh "$1" --verbose 2>&1 | tee run_sh_output.log

        # 4. (Optional) Stop container if you no longer need it running
        docker stop "$CONTAINER_NAME"
        docker rm "$CONTAINER_NAME"        

        echo "Review generated config files under output/workspaces/"
        total_slxs=$(find $(find 'output/' -type d -name 'slxs') -mindepth 1 -type d | wc -l)
        echo "Total SLXs: $total_slxs"
        echo "$total_slxs" > slx_count.txt
    silent: true


  ci-test-1:
      desc: "Run CI Discovery Test 1 - K8s and GCP - basic LOD "
      env:
        RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace"}}'
      vars: 
        EXPECTED_SLXS: "5"
      cmds:
        - |
          # Generate workspaceInfo.yaml with fetched cluster details
          cat <<EOF > workspaceInfo.yaml
          workspaceName: "$RW_WORKSPACE"
          workspaceOwnerEmail: authors@runwhen.com
          defaultLocation: location-01
          defaultLOD: none
          cloudConfig:
            kubernetes:             
              kubeconfigFile: /shared/kubeconfig.secret
              contexts:
                sandbox-cluster-1: 
                  defaultNamespaceLOD: basic
            gcp:
              applicationCredentialsFile: /shared/gcp.secret
              projects:
              - runwhen-nonprod-sandbox
              projectLevelOfDetails:
                runwhen-nonprod-sandbox: basic
          codeCollections: []
          custom: 
            kubernetes_distribution_binary: kubectl
          EOF

        - task: ci-run-rwl-discovery
        - task: verify-slx-count
          vars:
            EXPECTED_SLX_COUNT: "{{.EXPECTED_SLXS}}"
        - task: verify-rwl-output
      silent: true


  ci-test-2:
      desc: "Run CI Discovery Test 2 - K8s and GCP - detailed LOD "
      env:
        RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace"}}'
      vars: 
        EXPECTED_SLXS: "12"
      cmds:
        - |
          # Generate workspaceInfo.yaml with fetched cluster details
          cat <<EOF > workspaceInfo.yaml
          workspaceName: "$RW_WORKSPACE"
          workspaceOwnerEmail: authors@runwhen.com
          defaultLocation: location-01
          defaultLOD: none
          cloudConfig:
            kubernetes:             
              kubeconfigFile: /shared/kubeconfig.secret
              contexts:
                sandbox-cluster-1: 
                  defaultNamespaceLOD: detailed
              namespaces:
                - ci-verify-basic
          codeCollections: []
          custom: 
            kubernetes_distribution_binary: kubectl
          EOF

      
        - task: ci-run-rwl-discovery
        - task: verify-slx-count
          vars:
            EXPECTED_SLX_COUNT: "{{.EXPECTED_SLXS}}"

      silent: true

  verify-slx-count: 
    desc: "Validate SLX Count in CI test"
    vars:
      EXPECTED_SLX_COUNT: "{{.EXPECTED_SLX_COUNT | default `0`}}"
    cmds: 
      - |
          total_slxs=$(cat slx_count.txt)
          echo "---Validating SLX Count---"
          echo "Total SLXs: $total_slxs (Expected: {{.EXPECTED_SLX_COUNT}})"
          if [[ "$total_slxs" -lt "{{.EXPECTED_SLX_COUNT}}" ]]; then
            echo -e "\033[31m❌ Total SLX count failed\033[0m"
            exit 1
          else
            echo -e "\033[32m✔️ SLX Validation Passed\033[0m"
            exit 0
          fi
    silent: true

  verify-rwl-output: 
    desc: "Validate that rendered content is as intended"
    cmds: 
      - | 
        echo "Validate Runbook location configuration"
        RUNBOOK_FILE=$(find . -type f -name "runbook.yaml" | head -n 1)
        if [ -z "$RUNBOOK_FILE" ]; then
          echo "Error: No runbook.yaml file found in subdirectories." >&2
          exit 1
        fi
        LOCATION=$(yq e '.spec.location' "$RUNBOOK_FILE")
        if [ "$LOCATION" = "missing_workspaceInfo_custom_variable" ]; then
          echo "Error: runbook.yaml contains an invalid spec.location value." >&2
          exit 1
        fi
        echo "Validation successful: $RUNBOOK_FILE has a valid spec.location."

        echo "Validate SLI location configuration"
        SLI_FILE=$(find . -type f -name "sli.yaml" | head -n 1)
        if [ -z "$SLI_FILE" ]; then
          echo "Error: No sli.yaml file found in subdirectories." >&2
          exit 1
        fi
        LOCATION=$(yq e '.spec.location' "$SLI_FILE")
        if [ "$LOCATION" = "missing_workspaceInfo_custom_variable" ]; then
          echo "Error: runbook.yaml contains an invalid spec.location value." >&2
          exit 1
        fi
        echo "Validation successful: $SLI_FILE has a valid spec.location."
    silent: true

  ci-test-airgap-disabled:
    desc: "Test CloudQuery with airgap mode explicitly disabled"
    env:
      RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace"}}'
    vars: 
      EXPECTED_SLXS: "5"
    cmds:
      - |
        # Generate workspaceInfo.yaml for airgap test
        cat <<EOF > workspaceInfo.yaml
        workspaceName: "$RW_WORKSPACE"
        workspaceOwnerEmail: authors@runwhen.com
        defaultLocation: location-01
        defaultLOD: none
        cloudConfig:
          kubernetes:             
            kubeconfigFile: /shared/kubeconfig.secret
            contexts:
              sandbox-cluster-1: 
                defaultNamespaceLOD: basic
          gcp:
            applicationCredentialsFile: /shared/gcp.secret
            projects:
            - runwhen-nonprod-sandbox
            projectLevelOfDetails:
              runwhen-nonprod-sandbox: basic
        codeCollections: []
        custom: 
          kubernetes_distribution_binary: kubectl
        EOF

      - task: ci-run-rwl-discovery-airgap-disabled
      - task: verify-slx-count
        vars:
          EXPECTED_SLX_COUNT: "{{.EXPECTED_SLXS}}"
      - task: verify-airgap-logs
    silent: true

  ci-run-rwl-discovery-airgap-disabled:
    desc: "Run RunWhen Local Discovery with airgap mode explicitly disabled"
    cmds:
      - |
        rm slx_count.txt || true
        CONTAINER_NAME="RunWhenLocal-AirgapTest"    
        if docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Stopping and removing existing container $CONTAINER_NAME..."
          docker stop $CONTAINER_NAME && docker rm $CONTAINER_NAME
        elif docker ps -a -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Removing existing stopped container $CONTAINER_NAME..."
          docker rm $CONTAINER_NAME || echo "Container removal failed, continuing..."
        else
          echo "No existing container named $CONTAINER_NAME found."
        fi
        
        echo "Cleaning up output directory..."
        rm -rf output || { echo "Failed to remove output directory"; exit 1; }
        mkdir output && chmod 777 output || { echo "Failed to set permissions"; exit 1; }
        chmod 777 . 
        echo "Starting new container $CONTAINER_NAME with airgap mode disabled..."
        echo "User $(whoami)"
        
        # Start container with airgap mode explicitly disabled
        docker run -d \
          -e DEBUG_LOGS=true \
          -e CLOUDQUERY_AIRGAP_MODE=false \
          -e CLOUDQUERY_PLUGINS_PREINSTALLED=false \
          --name "$CONTAINER_NAME" \
          -p 8082:8000 \
          -v "$(pwd):/shared" \
          runwhen-local:test

        # Follow the main container logs in the background
        docker logs -f "$CONTAINER_NAME" &

        # Execute the workspace builder script and capture both container logs and exec output
        docker exec -w /workspace-builder "$CONTAINER_NAME" ./run.sh "$1" --verbose > exec_output.log 2>&1 &
        EXEC_PID=$!
        
        # Wait for the exec to complete
        wait $EXEC_PID
        EXEC_EXIT_CODE=$?
        
        # Get container logs which contain the airgap messages
        docker logs "$CONTAINER_NAME" > container_logs.log 2>&1
        
        # Combine both logs for analysis
        cat container_logs.log exec_output.log > airgap_test_output.log

        # Check if the run was successful
        if [ $EXEC_EXIT_CODE -ne 0 ]; then
          echo "❌ Discovery failed with airgap mode disabled"
          echo "Container logs:"
          tail -50 container_logs.log
          echo "Exec output:"
          tail -50 exec_output.log
          docker stop "$CONTAINER_NAME"
          docker rm "$CONTAINER_NAME"
          exit 1
        fi

        # Stop and remove container
        docker stop "$CONTAINER_NAME"
        docker rm "$CONTAINER_NAME"        

        echo "Review generated config files under output/workspaces/"
        total_slxs=$(find $(find 'output/' -type d -name 'slxs') -mindepth 1 -type d | wc -l)
        echo "Total SLXs: $total_slxs"
        echo "$total_slxs" > slx_count.txt
    silent: true

  verify-airgap-logs:
    desc: "Verify that airgap mode was properly disabled in logs"
    cmds:
      - |
        echo "---Verifying Airgap Mode Logs---"
        
        # Check that airgap mode was explicitly disabled
        if grep -q "CloudQuery airgap mode explicitly disabled via CLOUDQUERY_AIRGAP_MODE=false" airgap_test_output.log; then
          echo "✅ Found log confirming airgap mode was explicitly disabled"
        else
          echo "❌ Missing log entry for explicit airgap mode disable"
          echo "Searching for airgap-related logs:"
          grep -i "airgap\|offline" airgap_test_output.log || echo "No airgap logs found"
          exit 1
        fi
        
        # Check if we see 404 errors (this might be expected due to CloudQuery authentication changes)
        if grep -q "404 Not Found" airgap_test_output.log; then
          echo "⚠️  Found 404 Not Found errors - this may be due to CloudQuery authentication requirements"
          echo "   This is acceptable as long as airgap mode was properly disabled and K8s discovery worked"
          grep -A 2 -B 2 "404 Not Found" airgap_test_output.log | head -10
        else
          echo "✅ No 404 Not Found errors detected"
        fi
        
        # Check that CloudQuery online mode was used
        if grep -q "CloudQuery online mode - plugins will be downloaded as needed" airgap_test_output.log; then
          echo "✅ CloudQuery running in online mode as expected"
        else
          echo "⚠️  Could not confirm CloudQuery online mode (may be normal if log level is different)"
        fi
        
        echo "✅ Airgap mode verification passed"
    silent: true

  clean-rwl-discovery:
    desc: "Check and clean up RunWhen Local discovery output"
    cmds:
      - |
        rm -rf output
        rm -rf gcpapi-test-codecollection || true
        rm workspaceInfo.yaml
        rm airgap_test_output.log || true
        rm container_logs.log || true
        rm run_sh_output.log || true
        rm exec_output.log || true
        rm slx_count.txt || true
    silent: true

  # === Native gcpapi indexer (SQLite resource-store assertions) =============
  #
  # Mirrors .test/azure/no-aks-resources Taskfile: generate a workspaceInfo
  # that selects the native ``gcpapi`` backend + the SQLite resource store,
  # run discovery, then assert directly against output/resources.sqlite (not
  # the SLX count). The legacy ci-test-1 / ci-test-2 targets above still
  # exercise the CloudQuery GCP backend via SLX-count only.
  #
  # The project under test is read from gcp.secret's project_id so the same
  # target works against whatever sandbox SA the CI secret writes.

  generate-gcpapi-baseline-config:
    desc: "Emit workspaceInfo.yaml selecting the native gcpapi backend + SQLite store (defaultLOD=detailed)."
    silent: true
    env:
      RW_WORKSPACE: '{{.RW_WORKSPACE | default "gcpapi-baseline"}}'
    cmds:
      - |
        GCP_PROJECT=$(python3 -c "import json;print(json.load(open('gcp.secret'))['project_id'])")
        if [ -z "$GCP_PROJECT" ]; then
          echo "Could not read project_id from gcp.secret"; exit 1
        fi
        cat > workspaceInfo.yaml <<EOF
        workspaceName: "${RW_WORKSPACE}"
        workspaceOwnerEmail: authors@runwhen.com
        defaultLocation: location-01
        defaultLOD: detailed
        gcpIndexerBackend: gcpapi
        resourceStoreBackend: sqlite
        cloudConfig:
          gcp:
            applicationCredentialsFile: /shared/gcp.secret
            projects:
            - ${GCP_PROJECT}
            projectLevelOfDetails:
              ${GCP_PROJECT}: detailed
        # Load the bundled (default) code collections AND a tiny test-only local
        # code collection (built by generate-gcpapi-test-codecollection) that
        # references the compute typed-fallback types so selective discovery
        # exercises them. The local repo is cloned from the mounted /shared dir.
        codeCollections:
        - "defaults"
        - repoURL: "file:///shared/gcpapi-test-codecollection"
          ref: main
          codeBundles: ["*"]
        custom:
          kubernetes_distribution_binary: kubectl
        EOF
        echo "Wrote workspaceInfo.yaml (gcpapi baseline / project=${GCP_PROJECT}, defaultLOD=detailed)"

  generate-gcpapi-test-codecollection:
    desc: "Build a tiny local git code collection that references the compute typed-fallback types (proves fallback function without CAI)."
    silent: true
    cmds:
      - |
        # A minimal, self-contained code collection whose single generation rule
        # references the compute fallback types. Selective discovery only runs a
        # typed collector when a LOADED generation rule references its type, so
        # this guarantees gcp_compute_networks / gcp_compute_firewalls (the GCP
        # equivalent of AWS's always-present default VPC/SG) are collected -- no
        # CAI required. The rule intentionally has no SLXs: the baseline asserts
        # against output/resources.sqlite, not SLX rendering, so no templates are
        # needed and nothing fails at enrich time.
        CC_DIR=gcpapi-test-codecollection
        GR_DIR="${CC_DIR}/codebundles/gcp-compute-baseline/.runwhen/generation-rules"
        rm -rf "${CC_DIR}"
        mkdir -p "${GR_DIR}"
        cat > "${GR_DIR}/gcp-compute-baseline.yaml" <<'EOF'
        apiVersion: runwhen.com/v1
        kind: GenerationRules
        spec:
          platform: gcp
          generationRules:
            - resourceTypes:
                - gcp_compute_networks
                - gcp_compute_firewalls
              matchRules:
                - type: pattern
                  pattern: ".+"
                  properties: [name]
                  mode: substring
              slxs: []
        EOF
        # Turn it into a git repo on branch 'main' so the code-collection loader
        # (git-based) can clone it via the file:// URL from the mounted /shared.
        ( cd "${CC_DIR}" \
          && git -c init.defaultBranch=main init -q \
          && git -c user.email=ci@runwhen.com -c user.name=ci add -A \
          && git -c user.email=ci@runwhen.com -c user.name=ci commit -qm "test-only gcp compute fallback gen rule" )
        echo "Built local test code collection at ${CC_DIR} (references gcp_compute_networks, gcp_compute_firewalls)"

  ci-test-gcpapi-baseline:
    desc: "End to end: native gcpapi discovery. SQLite store must contain the project anchor + discovered GCP resources."
    cmds:
      - task: generate-gcpapi-baseline-config
      - task: generate-gcpapi-test-codecollection
      - task: build-rwl
      - task: run-rwl-discovery
      - task: assert-gcpapi-baseline

  assert-gcpapi-baseline:
    desc: "Verify the native gcpapi backend ran and persisted GCP resources to output/resources.sqlite."
    silent: true
    cmds:
      - |
        DB=output/resources.sqlite
        if [ ! -f "$DB" ]; then
          echo "FAIL: $DB not produced"
          exit 1
        fi

        # Snapshot the indexer stdout so we can confirm the *native* backend ran
        # (the run-rwl-discovery container stays up after discovery). The
        # gcpapi backend-selection log only lives in the container's logs.
        docker logs RunWhenLocal > container_logs.log 2>&1 || true

        GCP_PROJECT=$(python3 -c "import json;print(json.load(open('gcp.secret'))['project_id'])")
        fail=0

        # 1. The native gcpapi backend must have been selected (NOT cloudquery).
        if grep -qE "indexers.gcpapi: GCP indexer backend: 'gcpapi'" run_sh_output.log container_logs.log 2>/dev/null; then
          echo "OK   baseline: native gcpapi backend ran"
        else
          echo "FAIL baseline: native gcpapi backend did not run (expected gcpIndexerBackend=gcpapi)"
          fail=1
        fi

        # 1b. Cloud Asset Inventory is an OPTIONAL accelerator that broadens
        #     coverage to resource types without a typed collector. Its absence
        #     (API not enabled / no CAI viewer role) is normal and MUST NOT fail
        #     the baseline -- the per-service typed SDK collectors are the
        #     functional discovery path and are asserted below. This is purely
        #     informational so operators can see whether the CAI pass ran.
        if grep -q "GCP_CAI_PERMISSION_DENIED" run_sh_output.log container_logs.log 2>/dev/null; then
          echo "NOTE baseline: Cloud Asset Inventory was not accessible (optional accelerator)."
          echo "     -> This is expected and non-fatal. Native GCP discovery is driven by the"
          echo "        per-service typed collectors (asserted below). Enabling cloudasset.googleapis.com"
          echo "        with a CAI viewer role is optional and only increases coverage breadth."
        else
          echo "OK   baseline: Cloud Asset Inventory generic pass ran (optional accelerator available)"
        fi

        # 2. The project anchor must be present (resource_type 'project').
        n=$(sqlite3 "$DB" \
          "SELECT count(*) FROM resources WHERE platform='gcp' AND resource_type='project' AND name='${GCP_PROJECT}';" \
          2>/dev/null || echo 0)
        if [ "$n" -lt 1 ]; then
          echo "FAIL baseline: project anchor '${GCP_PROJECT}' not in resource store"
          fail=1
        else
          echo "OK   baseline: project anchor '${GCP_PROJECT}' present (${n} row)"
        fi

        # 3. At least a few GCP resources overall (anchor + real resources).
        total=$(sqlite3 "$DB" \
          "SELECT count(*) FROM resources WHERE platform='gcp';" \
          2>/dev/null || echo 0)
        if [ "$total" -lt 3 ]; then
          echo "FAIL baseline: expected >= 3 gcp resources, found ${total}"
          fail=1
        else
          echo "OK   baseline: ${total} gcp resources in store (>= 3)"
        fi

        # 4. Typed collectors (storage buckets + GKE clusters) populate the
        #    persistent sandbox infra. Assert presence (>= 1), not exact counts,
        #    so the test stays stable as buckets come and go. These types are
        #    referenced by the bundled rw-cli-codecollection generation rules.
        for rtype in gcp_storage_buckets gcp_container_clusters; do
          n=$(sqlite3 "$DB" \
            "SELECT count(*) FROM resources WHERE platform='gcp' AND resource_type='${rtype}';" \
            2>/dev/null || echo 0)
          if [ "$n" -lt 1 ]; then
            echo "FAIL baseline: expected >= 1 ${rtype}, found ${n}"
            fail=1
          else
            echo "OK   baseline: ${rtype} present (${n} row)"
          fi
        done

        # 5. PROOF the typed fallback collectors provide function WITHOUT CAI.
        #    The test-only code collection (gcpapi-test-codecollection, wired in
        #    by generate-gcpapi-test-codecollection) references gcp_compute_networks
        #    and gcp_compute_firewalls. Every GCP project has a default network +
        #    default firewall rules out of the box (like AWS's default VPC/SG), so
        #    these fallback collectors must return real sandbox resources even with
        #    CAI denied. We require the network (always present); the firewall count
        #    is reported but only required to be >= 1 alongside the network.
        net=$(sqlite3 "$DB" \
          "SELECT count(*) FROM resources WHERE platform='gcp' AND resource_type='gcp_compute_networks';" \
          2>/dev/null || echo 0)
        fw=$(sqlite3 "$DB" \
          "SELECT count(*) FROM resources WHERE platform='gcp' AND resource_type='gcp_compute_firewalls';" \
          2>/dev/null || echo 0)
        if [ "$net" -lt 1 ]; then
          echo "FAIL baseline: expected >= 1 gcp_compute_networks from the typed fallback collector, found ${net}"
          fail=1
        else
          echo "OK   baseline: gcp_compute_networks present (${net} row) via typed fallback collector (no CAI)"
        fi
        echo "INFO baseline: gcp_compute_firewalls present (${fw} row) via typed fallback collector"

        # Per-resource_type counts (report artifact + proof of typed-collector function).
        echo "---- gcp resource_type counts (output/resources.sqlite) ----"
        sqlite3 "$DB" \
          "SELECT resource_type, count(*) FROM resources WHERE platform='gcp' GROUP BY resource_type ORDER BY resource_type;" \
          2>/dev/null || true
        echo "---- referenced GCP resource types (from the indexer log) ----"
        grep -hE "GCP resource types referenced by generation rules:" run_sh_output.log container_logs.log 2>/dev/null | tail -1 || true

        exit "$fail"
