version: "3"

tasks:
  default:
    desc: "Generate workspaceInfo and rebuild/test"
    cmds:
      - task: generate-rwl-config-basic
      - task: build-rwl
      - task: run-rwl-discovery

  clean:
    desc: "Run cleanup tasks"
    cmds:
      - task: clean-rwl-discovery

  generate-rwl-config-detailed:
    desc: "Generate RunWhen Local configuration (workspaceInfo.yaml)"
    env:
      RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace"}}'
    cmds:
      - |
        # Generate workspaceInfo.yaml with fetched cluster details
        cat <<EOF > workspaceInfo.yaml
        workspaceName: "$RW_WORKSPACE"
        workspaceOwnerEmail: authors@runwhen.com
        defaultLocation: location-01
        defaultLOD: detailed
        cloudConfig:
          kubernetes:             
            kubeconfigFile: /shared/kubeconfig.secret
            contexts:
              sandbox-cluster-1: 
                defaultNamespaceLOD: detailed
        codeCollections: []
        # codeCollections: 
        #   - repoURL: "https://github.com/runwhen-contrib/rw-cli-codecollection"
        #     branch: "main"
        #     codeBundles: ["k8s-namespace-healthcheck", "k8s-deployment-healthcheck"]
        custom: 
          kubernetes_distribution_binary: kubectl
        EOF
    silent: true

  generate-rwl-config-basic:
    desc: "Generate RunWhen Local configuration (workspaceInfo.yaml)"
    env:
      RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace"}}'
    cmds:
      - |
        # Generate workspaceInfo.yaml with fetched cluster details
        cat <<EOF > workspaceInfo.yaml
        workspaceName: "$RW_WORKSPACE"
        workspaceOwnerEmail: authors@runwhen.com
        defaultLocation: location-01
        defaultLOD: detailed
        cloudConfig:
          kubernetes:             
            kubeconfigFile: /shared/kubeconfig.secret
            contexts:
              sandbox-cluster-1: 
                defaultNamespaceLOD: basic
        codeCollections: []
        # codeCollections: 
        #   - repoURL: "https://github.com/runwhen-contrib/rw-cli-codecollection"
        #     branch: "main"
        #     codeBundles: ["k8s-namespace-healthcheck", "k8s-deployment-healthcheck"]
        custom: 
          kubernetes_distribution_binary: kubectl
        EOF
    silent: true

  build-rwl:
    desc: "Build RWL test image"
    cmds:
      - |
        BUILD_DIR=../../../src/
        CONTAINER_NAME="RunWhenLocal"
        if docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Stopping and removing existing container $CONTAINER_NAME..."
          docker stop $CONTAINER_NAME && docker rm $CONTAINER_NAME
        elif docker ps -a -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Removing existing stopped container $CONTAINER_NAME..."
          docker rm $CONTAINER_NAME
        else
          echo "No existing container named $CONTAINER_NAME found."
        fi
        
        echo "Cleaning up output directory..."
        rm -rf output || { echo "Failed to remove output directory"; exit 1; }
        mkdir output && chmod 777 output || { echo "Failed to set permissions"; exit 1; }
        ## Building Container Image
        docker buildx build --builder mybuilder --platform linux/amd64  --build-arg INCLUDE_CODE_COLLECTION_CACHE=true -t runwhen-local:test -f $BUILD_DIR/Dockerfile $BUILD_DIR --load

        ## Use this if you need to test both arm64/amd64 builds
        # docker buildx build --builder mybuilder --platform linux/amd64,linux/arm64  -t runwhen-local:test -f $BUILD_DIR/Dockerfile $BUILD_DIR

    silent: true


  run-rwl-discovery-no-github:
    desc: "Run RunWhen Local Discovery on test infrastructure"
    cmds:
      - |
        rm slx_count.txt || true
        CONTAINER_NAME="RunWhenLocal"    
        if docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Stopping and removing existing container $CONTAINER_NAME..."
          docker stop $CONTAINER_NAME && docker rm $CONTAINER_NAME
        elif docker ps -a -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Removing existing stopped container $CONTAINER_NAME..."
          docker rm $CONTAINER_NAME
        else
          echo "No existing container named $CONTAINER_NAME found."
        fi
        
        echo "Cleaning up output directory..."
        rm -rf output || { echo "Failed to remove output directory"; exit 1; }
        mkdir output && chmod 777 output || { echo "Failed to set permissions"; exit 1; }

        echo "Starting new container $CONTAINER_NAME..."

        docker run -e DEBUG_LOGGING=false --add-host github.com:0.0.0.0 --name $CONTAINER_NAME -p 8000:8000 -v $(pwd):/shared -d runwhen-local:test || {
          echo "Failed to start container"; exit 1;
        }

        echo "Running workspace builder script in container..."
        docker exec -w /workspace-builder $CONTAINER_NAME ./run.sh $1 --verbose || {
          echo "Error executing script in container"; exit 1;
        }

        echo "Review generated config files under output/workspaces/"
        total_slxs=$(find $(find 'output/' -type d -name 'slxs') -mindepth 1 -type d | wc -l)
        echo "Total SLXs: $total_slxs"
        echo "$total_slxs" > slx_count.txt
    silent: true

  run-rwl-discovery:
    desc: "Run RunWhen Local Discovery on test infrastructure"
    cmds:
      - |
        rm slx_count.txt || true
        CONTAINER_NAME="RunWhenLocal"    
        if docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Stopping and removing existing container $CONTAINER_NAME..."
          docker stop $CONTAINER_NAME && docker rm $CONTAINER_NAME
        elif docker ps -a -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Removing existing stopped container $CONTAINER_NAME..."
          docker rm $CONTAINER_NAME
        else
          echo "No existing container named $CONTAINER_NAME found."
        fi
        
        echo "Cleaning up output directory..."
        rm -rf output || { echo "Failed to remove output directory"; exit 1; }
        mkdir output && chmod 777 output || { echo "Failed to set permissions"; exit 1; }

        echo "Starting new container $CONTAINER_NAME..."

        docker run -e DEBUG_LOGGING=false --name $CONTAINER_NAME -p 8000:8000 -v $(pwd):/shared -d runwhen-local:test || {
          echo "Failed to start container"; exit 1;
        }

        echo "Running workspace builder script in container..."
        docker exec -w /workspace-builder $CONTAINER_NAME ./run.sh $1 --verbose || {
          echo "Error executing script in container"; exit 1;
        }

        echo "Review generated config files under output/workspaces/"
        total_slxs=$(find $(find 'output/' -type d -name 'slxs') -mindepth 1 -type d | wc -l)
        echo "Total SLXs: $total_slxs"
        echo "$total_slxs" > slx_count.txt
    silent: true

  ci-run-rwl-discovery:
    desc: "Run RunWhen Local Discovery on test infrastructure"
    cmds:
      - |
        rm slx_count.txt || true
        CONTAINER_NAME="RunWhenLocal"    
        if docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Stopping and removing existing container $CONTAINER_NAME..."
          docker stop $CONTAINER_NAME && docker rm $CONTAINER_NAME
        elif docker ps -a -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Removing existing stopped container $CONTAINER_NAME..."
          docker rm $CONTAINER_NAME
        else
          echo "No existing container named $CONTAINER_NAME found."
        fi
        
        echo "Cleaning up output directory..."
        rm -rf output || { echo "Failed to remove output directory"; exit 1; }
        mkdir output && chmod 777 output || { echo "Failed to set permissions"; exit 1; }
        chmod 777 . 
        echo "Starting new container $CONTAINER_NAME..."
        echo "User $(whoami)"
        # 1. Start container in the background
        docker run -d \
          -e DEBUG_LOGS=true \
          --name "$CONTAINER_NAME" \
          -p 8000:8000 \
          -v "$(pwd):/shared" \
          runwhen-local:test

        # 2. Follow the main container logs in the background (if you care about them)
        docker logs -f "$CONTAINER_NAME" &

        # 3. Now exec the script. Its stdout goes to your pipeline.
        #    By default, docker exec prints to the current terminal/session.
        docker exec -w /workspace-builder "$CONTAINER_NAME" ./run.sh "$1" --verbose 2>&1 | tee run_sh_output.log

        # 3.5. Capture container logs before stopping (needed for git safe directory validation)
        echo "Capturing container logs..."
        docker logs "$CONTAINER_NAME" > container_logs.log 2>&1 || echo "Failed to capture container logs"

        # 4. (Optional) Stop container if you no longer need it running
        docker stop "$CONTAINER_NAME"
        docker rm "$CONTAINER_NAME"        

        echo "Review generated config files under output/workspaces/"
        total_slxs=$(find $(find 'output/' -type d -name 'slxs') -mindepth 1 -type d | wc -l)
        echo "Total SLXs: $total_slxs"
        echo "$total_slxs" > slx_count.txt
    silent: true


  ci-run-rwl-discovery-airgapped:
    desc: "Run RunWhen Local Discovery with github.com blocked (for local-git validation)"
    cmds:
      - |
        rm slx_count.txt || true
        CONTAINER_NAME="RunWhenLocal"    
        if docker ps -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Stopping and removing existing container $CONTAINER_NAME..."
          docker stop $CONTAINER_NAME && docker rm $CONTAINER_NAME
        elif docker ps -a -q --filter "name=$CONTAINER_NAME" | grep -q .; then
          echo "Removing existing stopped container $CONTAINER_NAME..."
          docker rm $CONTAINER_NAME
        else
          echo "No existing container named $CONTAINER_NAME found."
        fi
        
        echo "Cleaning up output directory..."
        rm -rf output || { echo "Failed to remove output directory"; exit 1; }
        mkdir output && chmod 777 output || { echo "Failed to set permissions"; exit 1; }
        chmod 777 . 
        echo "Starting new container $CONTAINER_NAME (github.com blocked)..."
        echo "User $(whoami)"
        # 1. Start container with github.com/api.github.com blocked via /etc/hosts
        docker run -d \
          -e DEBUG_LOGS=true \
          --add-host github.com:0.0.0.0 \
          --add-host api.github.com:0.0.0.0 \
          --name "$CONTAINER_NAME" \
          -p 8000:8000 \
          -v "$(pwd):/shared" \
          runwhen-local:test

        # 2. Follow the main container logs in the background
        docker logs -f "$CONTAINER_NAME" &

        # 3. Exec run.sh — its stdout goes to the pipeline
        docker exec -w /workspace-builder "$CONTAINER_NAME" ./run.sh "$1" --verbose 2>&1 | tee run_sh_output.log

        # 3.5. Capture container logs before stopping
        echo "Capturing container logs..."
        docker logs "$CONTAINER_NAME" > container_logs.log 2>&1 || echo "Failed to capture container logs"

        # 4. Stop and remove container
        docker stop "$CONTAINER_NAME"
        docker rm "$CONTAINER_NAME"        

        echo "Review generated config files under output/workspaces/"
        total_slxs=$(find $(find 'output/' -type d -name 'slxs') -mindepth 1 -type d | wc -l)
        echo "Total SLXs: $total_slxs"
        echo "$total_slxs" > slx_count.txt
    silent: true

  ci-test-1:
      desc: "Run CI Discovery Test 1 - K8s only - basic LOD "
      env:
        RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace"}}'
      vars: 
        EXPECTED_SLXS: "5"
      cmds:
        - |
          # Generate workspaceInfo.yaml with fetched cluster details
          cat <<EOF > workspaceInfo.yaml
          workspaceName: "$RW_WORKSPACE"
          workspaceOwnerEmail: authors@runwhen.com
          defaultLocation: location-01
          defaultLOD: none
          cloudConfig:
            kubernetes:             
              kubeconfigFile: /shared/kubeconfig.secret
              contexts:
                sandbox-cluster-1: 
                  defaultNamespaceLOD: basic
              
              namespaces:
                - ci-verify-basic
          codeCollections: []
          custom: 
            kubernetes_distribution_binary: kubectl
          EOF

        - task: ci-run-rwl-discovery
        - task: verify-slx-count
          vars:
            EXPECTED_SLX_COUNT: "{{.EXPECTED_SLXS}}"
        - task: verify-rwl-output
        - task: validate-k8s-yaml
      silent: true


  ci-test-2:
      desc: "Run CI Discovery Test 2 - K8s only - detailed LOD "
      env:
        RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace"}}'
      vars: 
        EXPECTED_SLXS: "12"
      cmds:
        - |
          # Generate workspaceInfo.yaml with fetched cluster details
          cat <<EOF > workspaceInfo.yaml
          workspaceName: "$RW_WORKSPACE"
          workspaceOwnerEmail: authors@runwhen.com
          defaultLocation: location-01
          defaultLOD: none
          cloudConfig:
            kubernetes:             
              kubeconfigFile: /shared/kubeconfig.secret
              contexts:
                sandbox-cluster-1: 
                  defaultNamespaceLOD: detailed
              namespaces:
                - ci-verify-basic
          codeCollections: []
          custom: 
            kubernetes_distribution_binary: kubectl
          EOF

      
        - task: ci-run-rwl-discovery
        - task: verify-slx-count
          vars:
            EXPECTED_SLX_COUNT: "{{.EXPECTED_SLXS}}"
        - task: validate-k8s-yaml


      silent: true

  test-multi-kubeconfig:
      desc: "Test multi-context kubeconfig with overlapping namespaces"
      cmds:
        - |
          echo "Testing multi-context kubeconfig discovery..."
          echo "Expected: Both watcher-platform-cluster-01 and beta-platform-cluster-01"
          echo "should emit SLXs for backend-services namespace (LOD: detailed)"
          
          # Copy the multi-kubeconfig workspaceInfo
          cp multi-kubeconfig-workspaceInfo.yaml workspaceInfo.yaml

        - task: build-rwl
        - task: run-rwl-discovery
        
        - |
          echo ""
          echo "=== Multi-Context Test Results ==="
          total_slxs=$(find $(find 'output/' -type d -name 'slxs') -mindepth 1 -type d 2>/dev/null | wc -l)
          echo "Total SLXs generated: $total_slxs"
          echo ""
          echo "Review the generated SLXs in output/workspaces/"
          echo "Check the logs for namespace processing from both contexts"
      silent: false

  ci-test-local-git:
      desc: "Run CI Discovery Test - Local Git Functionality Validation"
      env:
        RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace-local-git"}}'
      vars: 
        EXPECTED_SLXS: "1"
      cmds:
        - |
          # Generate workspaceInfo.yaml with useLocalGit enabled and explicit code collections
          cat <<EOF > workspaceInfo.yaml
          workspaceName: "$RW_WORKSPACE"
          workspaceOwnerEmail: authors@runwhen.com
          defaultLocation: location-01
          defaultLOD: none
          cloudConfig:
            kubernetes:             
              kubeconfigFile: /shared/kubeconfig.secret
              contexts:
                sandbox-cluster-1: 
                  defaultNamespaceLOD: detailed
          codeCollections:
          - repoURL: https://github.com/runwhen-contrib/rw-public-codecollection.git
            tag: v0.0.20
          - repoURL: https://github.com/runwhen-contrib/rw-cli-codecollection.git
            tag: v0.0.26
            codeBundles: ["k8s-cluster-resource-health"]
          - repoURL: https://github.com/runwhen-contrib/rw-workspace-utils.git
            tag: 2025-11-03.1
          - repoURL: https://github.com/runwhen-contrib/azure-c7n-codecollection.git
            tag: v0.0.1
          useLocalGit: true
          custom: 
            kubernetes_distribution_binary: kubectl
          EOF

        - task: ci-run-rwl-discovery-airgapped
        - task: verify-local-git-logs
        - task: verify-slx-count
          vars:
            EXPECTED_SLX_COUNT: "{{.EXPECTED_SLXS}}"
        - task: validate-k8s-yaml

      silent: true

  verify-local-git-logs:
    desc: "Verify that local git functionality worked correctly by checking logs"
    vars:
      # Expected code collections that must be served from local cache.
      # Must match repos in src/default-code-collections.yaml (those baked into the image).
      # rw-generic-codecollection is NOT in the default cache — it will clone remotely.
      EXPECTED_CACHED_REPOS: "rw-public-codecollection rw-cli-codecollection rw-workspace-utils azure-c7n-codecollection"
    cmds:
      - |
        echo ""
        echo "========================================"
        echo "  Local Git Functionality Validation"
        echo "========================================"
        echo ""

        FAILURES=0
        WARNINGS=0

        # Helper: search both log files (container_logs.log has entrypoint + FastAPI server output,
        # run_sh_output.log has the docker-exec run.sh output)
        search_logs() {
          local pattern="$1"
          grep -q "$pattern" run_sh_output.log 2>/dev/null && return 0
          [ -f container_logs.log ] && grep -q "$pattern" container_logs.log 2>/dev/null && return 0
          return 1
        }
        extract_logs() {
          local pattern="$1"
          { grep "$pattern" run_sh_output.log 2>/dev/null; [ -f container_logs.log ] && grep "$pattern" container_logs.log 2>/dev/null; } | sort -u
        }

        # ── 1. USE_LOCAL_GIT resolved correctly ──────────────────────
        echo "--- [1/7] USE_LOCAL_GIT configuration ---"
        if search_logs "USE_LOCAL_GIT resolved to True"; then
          echo -e "\033[32m  ✔ USE_LOCAL_GIT resolved to True\033[0m"
          extract_logs "USE_LOCAL_GIT resolved to" | sed 's/^/    /'
        elif search_logs "Using local git cache dir:"; then
          echo -e "\033[32m  ✔ USE_LOCAL_GIT is active (inferred from cache usage)\033[0m"
          WARNINGS=$((WARNINGS + 1))
          echo -e "\033[33m    ⚠ 'USE_LOCAL_GIT resolved to' log line not found — upgrade code_collection.py\033[0m"
        else
          echo -e "\033[31m  ✘ USE_LOCAL_GIT does not appear to be enabled\033[0m"
          echo "    Searched for 'USE_LOCAL_GIT resolved to True' and 'Using local git cache dir:'"
          echo "    in run_sh_output.log and container_logs.log"
          FAILURES=$((FAILURES + 1))
        fi
        echo ""

        # ── 2. Git safe directories ──────────────────────────────────
        echo "--- [2/7] Git safe directory configuration ---"
        SAFE_DIR_COUNT=$(extract_logs "Added safe directory:" | wc -l)
        if [ "$SAFE_DIR_COUNT" -gt 0 ]; then
          echo -e "\033[32m  ✔ $SAFE_DIR_COUNT safe directories configured\033[0m"
          extract_logs "Added safe directory:" | sed 's/^/    /'
        elif search_logs "Found cache directory:"; then
          # The entrypoint found the cache root — safe dirs may already have been configured
          # (the "Added" message only appears for newly-added entries)
          echo -e "\033[32m  ✔ Cache directory found by entrypoint (safe dirs already configured)\033[0m"
          extract_logs "Found cache directory:" | sed 's/^/    /'
        else
          echo -e "\033[31m  ✘ No evidence of git safe directory configuration in logs\033[0m"
          FAILURES=$((FAILURES + 1))
        fi
        echo ""

        # ── 3. All expected code collections served from local cache ─
        echo "--- [3/7] Code collections served from local cache ---"
        CACHE_HIT_COUNT=0
        CACHE_MISS_REPOS=""
        for repo in {{.EXPECTED_CACHED_REPOS}}; do
          if search_logs "Using local git cache dir:.*${repo}"; then
            echo -e "\033[32m  ✔ ${repo} — served from local cache\033[0m"
            CACHE_HIT_COUNT=$((CACHE_HIT_COUNT + 1))
          else
            echo -e "\033[31m  ✘ ${repo} — NOT found in local cache logs\033[0m"
            CACHE_MISS_REPOS="${CACHE_MISS_REPOS} ${repo}"
            FAILURES=$((FAILURES + 1))
          fi
        done
        EXPECTED_COUNT=$(echo "{{.EXPECTED_CACHED_REPOS}}" | wc -w)
        echo "  ($CACHE_HIT_COUNT / $EXPECTED_COUNT code collections from cache)"
        echo ""

        # ── 4. No remote clone operations ─────────────────────────────
        echo "--- [4/7] No remote git clone/fetch operations ---"
        if search_logs "Cloning from git source"; then
          echo -e "\033[31m  ✘ Remote clone detected — useLocalGit should prevent this\033[0m"
          extract_logs "Cloning from git source" | sed 's/^/    /'
          FAILURES=$((FAILURES + 1))
        else
          echo -e "\033[32m  ✔ No remote clone operations detected\033[0m"
        fi
        if search_logs "falling back to remote clone"; then
          echo -e "\033[31m  ✘ Cache miss detected — a code collection fell back to remote clone\033[0m"
          extract_logs "falling back to remote clone" | sed 's/^/    /'
          FAILURES=$((FAILURES + 1))
        else
          echo -e "\033[32m  ✔ No cache-miss fallbacks detected\033[0m"
        fi
        echo ""

        # ── 5. Network isolation (github.com blocked) ─────────────────
        echo "--- [5/7] Network isolation ---"
        if search_logs "github.com blocked\|add-host"; then
          echo -e "\033[32m  ✔ github.com appears blocked (--add-host flag used)\033[0m"
        else
          # Verify by checking container /etc/hosts for the 0.0.0.0 entry
          echo "  (Checking container was started with github.com blocked...)"
          if search_logs "github.com:0.0.0.0"; then
            echo -e "\033[32m  ✔ github.com blocked via /etc/hosts\033[0m"
          else
            # If no explicit evidence, the fact that no remote clones happened is sufficient
            echo -e "\033[32m  ✔ No remote operations occurred (network isolation effective)\033[0m"
          fi
        fi
        echo ""

        # ── 6. No dubious ownership / git errors ─────────────────────
        echo "--- [6/7] Git error checks ---"
        if search_logs "dubious ownership"; then
          echo -e "\033[31m  ✘ Git dubious ownership error detected\033[0m"
          extract_logs "dubious ownership" | sed 's/^/    /'
          FAILURES=$((FAILURES + 1))
        else
          echo -e "\033[32m  ✔ No dubious ownership errors\033[0m"
        fi
        if search_logs "SHA is empty"; then
          echo -e "\033[31m  ✘ Git 'SHA is empty' error detected\033[0m"
          extract_logs "SHA is empty" | sed 's/^/    /'
          FAILURES=$((FAILURES + 1))
        else
          echo -e "\033[32m  ✔ No 'SHA is empty' errors\033[0m"
        fi
        echo ""

        # ── 7. Workspace builder completed without errors ─────────────
        echo "--- [7/7] Workspace builder completion ---"
        if search_logs "Error 500 from Workspace Builder"; then
          echo -e "\033[31m  ✘ Workspace Builder returned error 500\033[0m"
          FAILURES=$((FAILURES + 1))
        elif search_logs "Workspace builder completed successfully"; then
          echo -e "\033[32m  ✔ Workspace builder completed successfully\033[0m"
        else
          echo -e "\033[33m  ⚠ Could not confirm workspace builder success message\033[0m"
          WARNINGS=$((WARNINGS + 1))
        fi
        echo ""

        # ── Summary ───────────────────────────────────────────────────
        echo "========================================"
        echo "  Results: $FAILURES failure(s), $WARNINGS warning(s)"
        echo "========================================"
        if [ "$FAILURES" -gt 0 ]; then
          echo -e "\033[31m  ✘ Local Git Functionality Validation FAILED\033[0m"
          echo ""
          echo "--- Debug: last 30 lines of run_sh_output.log ---"
          tail -30 run_sh_output.log 2>/dev/null || echo "(file not found)"
          echo ""
          if [ -f container_logs.log ]; then
            echo "--- Debug: last 30 lines of container_logs.log ---"
            tail -30 container_logs.log 2>/dev/null
            echo ""
          fi
          exit 1
        else
          echo -e "\033[32m  ✔ Local Git Functionality Validation PASSED\033[0m"
        fi
    silent: true

  verify-slx-count: 
    desc: "Validate SLX Count in CI test"
    vars:
      EXPECTED_SLX_COUNT: "{{.EXPECTED_SLX_COUNT | default `0`}}"
    cmds: 
      - |
          total_slxs=$(cat slx_count.txt)
          echo "---Validating SLX Count---"
          echo "Total SLXs: $total_slxs (Expected: {{.EXPECTED_SLX_COUNT}})"
          if [[ "$total_slxs" -lt "{{.EXPECTED_SLX_COUNT}}" ]]; then
            echo -e "\033[31m❌ Total SLX count failed\033[0m"
            exit 1
          else
            echo -e "\033[32m✔️ SLX Validation Passed\033[0m"
            exit 0
          fi
    silent: true

  verify-rwl-output: 
    desc: "Validate that rendered content is as intended"
    cmds: 
      - | 
        echo "Validate Runbook location configuration"
        RUNBOOK_FILE=$(find . -type f -name "runbook.yaml" | head -n 1)
        if [ -z "$RUNBOOK_FILE" ]; then
          echo "Error: No runbook.yaml file found in subdirectories." >&2
          exit 1
        fi
        LOCATION=$(yq e '.spec.location' "$RUNBOOK_FILE")
        if [ "$LOCATION" = "missing_workspaceInfo_custom_variable" ]; then
          echo "Error: runbook.yaml contains an invalid spec.location value." >&2
          exit 1
        fi
        echo "Validation successful: $RUNBOOK_FILE has a valid spec.location."

        echo "Validate SLI location configuration"
        SLI_FILE=$(find . -type f -name "sli.yaml" | head -n 1)
        if [ -z "$SLI_FILE" ]; then
          echo "Error: No sli.yaml file found in subdirectories." >&2
          exit 1
        fi
        LOCATION=$(yq e '.spec.location' "$SLI_FILE")
        if [ "$LOCATION" = "missing_workspaceInfo_custom_variable" ]; then
          echo "Error: runbook.yaml contains an invalid spec.location value." >&2
          exit 1
        fi
        echo "Validation successful: $SLI_FILE has a valid spec.location."
    silent: true

  clean-rwl-discovery:
    desc: "Check and clean up RunWhen Local discovery output"
    cmds:
      - |
        rm -rf output
        rm workspaceInfo.yaml
    silent: true

  validate-k8s-yaml:
    desc: "Validate generated YAML files for K8s compatibility issues"
    cmds:
      - |
        if [ ! -d "output" ]; then
          echo "❌ Output directory does not exist. Run discovery first."
          exit 1
        fi
        echo "🔍 Validating K8s YAML compatibility..."
        python3 ../validate-yaml-compatibility.py output/workspaces/
    silent: false

  ci-test-with-validation:
    desc: "Run CI test with K8s YAML validation"
    cmds:
      - task: generate-rwl-config-basic
      - task: build-rwl
      - task: run-rwl-discovery
      - task: validate-k8s-yaml
      - echo "✅ CI test with validation completed successfully!"

  validate-only:
    desc: "Run only YAML validation on existing output (for quick testing)"
    cmds:
      - task: validate-k8s-yaml

  unit-test-src:
    desc: "Fast no-Docker unit tests for the workspace builder source (indexers, normalizers, SQLite writer). Useful while iterating on src/ - no need to rebuild the image to catch encoder / writer regressions."
    cmds:
      - |
        SRC_DIR=../../../src
        if [ ! -d "$SRC_DIR" ]; then
          echo "❌ src/ not found at $SRC_DIR"; exit 1
        fi
        echo "Running unittest discovery under $SRC_DIR/indexers ..."
        cd "$SRC_DIR" && python3 -m unittest \
          indexers.test_sqlite_resource_writer \
          indexers.test_azureapi_normalizers \
          -v
    silent: false

  ci-test-sqlite-store:
    desc: "Run discovery with resourceStoreBackend=sqlite and verify the SQLite file lands in the output directory with non-empty platform/resource rows."
    env:
      RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace-sqlite"}}'
    cmds:
      - |
        cat <<EOF > workspaceInfo.yaml
        workspaceName: "$RW_WORKSPACE"
        workspaceOwnerEmail: authors@runwhen.com
        defaultLocation: location-01
        defaultLOD: detailed
        cloudConfig:
          kubernetes:
            kubeconfigFile: /shared/kubeconfig.secret
            contexts:
              sandbox-cluster-1:
                defaultNamespaceLOD: basic
        codeCollections: []
        custom:
          kubernetes_distribution_binary: kubectl
        resourceStoreBackend: sqlite
        resourceStorePath: resources.sqlite
        EOF

      - task: build-rwl
      - task: run-rwl-discovery

      - |
        echo ""
        echo "=== SQLite resource store validation ==="
        DB_FILE=$(find output -maxdepth 3 -name 'resources.sqlite' | head -n 1)
        if [ -z "$DB_FILE" ]; then
          echo "❌ resources.sqlite not produced by discovery"
          find output -maxdepth 3 -type f | sed 's/^/    /'
          exit 1
        fi
        echo "✔ Found SQLite store: $DB_FILE ($(stat -c%s "$DB_FILE") bytes)"

        if ! command -v sqlite3 >/dev/null; then
          echo "ℹ sqlite3 CLI not available on host; falling back to python3 inspection"
          PY=python3
          $PY - "$DB_FILE" <<'PY' || exit 1
        import sqlite3, sys
        conn = sqlite3.connect(sys.argv[1])
        platforms = [r[0] for r in conn.execute("SELECT name FROM platforms")]
        types     = conn.execute("SELECT COUNT(*) FROM resource_types").fetchone()[0]
        rows      = conn.execute("SELECT COUNT(*) FROM resources").fetchone()[0]
        artifacts = conn.execute("SELECT COUNT(*) FROM workspace_artifacts").fetchone()[0]
        slx_rows  = conn.execute("SELECT COUNT(*) FROM workspace_artifacts WHERE artifact_kind='slx'").fetchone()[0]
        version   = conn.execute("SELECT value FROM schema_meta WHERE key='schema_version'").fetchone()
        print(f"  schema_version : {version[0] if version else 'MISSING'}")
        print(f"  platforms      : {platforms}")
        print(f"  resource_types : {types}")
        print(f"  resources      : {rows}")
        print(f"  artifacts      : {artifacts}")
        print(f"  slx files      : {slx_rows}")
        if not platforms:
            print("❌ no platforms in store"); sys.exit(1)
        if rows == 0:
            print("❌ resources table is empty"); sys.exit(1)
        if artifacts == 0:
            print("❌ workspace_artifacts table is empty"); sys.exit(1)
        if slx_rows == 0:
            print("❌ no slx.yaml artifacts persisted"); sys.exit(1)
        print("✔ SQLite store is populated")
        PY
        else
          PLATFORMS=$(sqlite3 "$DB_FILE" "SELECT name FROM platforms;" | tr '\n' ' ')
          TYPES=$(sqlite3 "$DB_FILE" "SELECT COUNT(*) FROM resource_types;")
          ROWS=$(sqlite3 "$DB_FILE" "SELECT COUNT(*) FROM resources;")
          ARTIFACTS=$(sqlite3 "$DB_FILE" "SELECT COUNT(*) FROM workspace_artifacts;")
          SLX_ROWS=$(sqlite3 "$DB_FILE" "SELECT COUNT(*) FROM workspace_artifacts WHERE artifact_kind='slx';")
          VERSION=$(sqlite3 "$DB_FILE" "SELECT value FROM schema_meta WHERE key='schema_version';")
          echo "  schema_version : ${VERSION:-MISSING}"
          echo "  platforms      : ${PLATFORMS:-(none)}"
          echo "  resource_types : $TYPES"
          echo "  resources      : $ROWS"
          echo "  artifacts      : $ARTIFACTS"
          echo "  slx files      : $SLX_ROWS"
          if [ -z "$PLATFORMS" ] || [ "$ROWS" -eq 0 ]; then
            echo "❌ SQLite store is empty"
            exit 1
          fi
          if [ "$ARTIFACTS" -eq 0 ] || [ "$SLX_ROWS" -eq 0 ]; then
            echo "❌ workspace artifacts not persisted"
            exit 1
          fi
          echo "✔ SQLite store is populated"
        fi
    silent: false

  ci-test-skill-overlay:
    desc: "Run discovery pinned to rw-cli-codecollection feat/skill-overlay and verify the Skill overlay pipeline. The overlay is conditional: only codebundles that ship a Skill markdown file (SKILL.md, Skill.md, or skill.md — matched case-insensitively) at the bundle root produce an overlay file. The test asks GitHub how many Skill markdown files exist on the branch and tightens its assertions accordingly, so it stays green today and tightens automatically once Skill markdown files start landing upstream."
    env:
      RW_WORKSPACE: '{{.RW_WORKSPACE | default "my-workspace-skill"}}'
      SKILL_BRANCH: '{{.SKILL_BRANCH | default "feat/skill-overlay"}}'
    cmds:
      - |
        cat <<EOF > workspaceInfo.yaml
        workspaceName: "$RW_WORKSPACE"
        workspaceOwnerEmail: authors@runwhen.com
        defaultLocation: location-01
        defaultLOD: detailed
        cloudConfig:
          kubernetes:
            kubeconfigFile: /shared/kubeconfig.secret
            contexts:
              sandbox-cluster-1:
                defaultNamespaceLOD: basic
            namespaces:
              - ci-verify-basic
        codeCollections:
          - repoURL: https://github.com/runwhen-contrib/rw-cli-codecollection.git
            branch: ${SKILL_BRANCH}
        useLocalGit: false
        custom:
          kubernetes_distribution_binary: kubectl
        resourceStoreBackend: sqlite
        resourceStorePath: resources.sqlite
        EOF

      - task: build-rwl
      - task: run-rwl-discovery

      - |
        echo ""
        echo "=== Branch override validation ==="
        # Confirm the codecollection override actually took effect: every rendered
        # slx.yaml records the source ref via common-annotations (sourceGenerationRuleRepoRef).
        REF_HITS=$(grep -rl "sourceGenerationRuleRepoRef: ${SKILL_BRANCH}" output/workspaces 2>/dev/null | wc -l | tr -d ' ')
        echo "  slx.yaml files referencing ref '${SKILL_BRANCH}' : $REF_HITS"
        if [ "$REF_HITS" -eq 0 ]; then
          echo "❌ codeCollections override did not take effect — no SLX references ref '${SKILL_BRANCH}'."
          echo "   Sample slx.yaml ref lines we did see:"
          grep -rh "sourceGenerationRuleRepoRef:" output/workspaces 2>/dev/null | sort -u | head -5 | sed 's/^/    /'
          exit 1
        fi
        echo "✔ codeCollections override honored"

      - |
        echo ""
        echo "=== Skill overlay validation ==="
        # `-iname` matches any case (SKILL.md, Skill.md, skill.md, sKiLL.Md, ...).
        SLX_COUNT=$(find output -mindepth 4 -type d -path '*/slxs/*' | wc -l | tr -d ' ')
        SKILL_COUNT=$(find output -type f -iname 'skill.md' -path '*/slxs/*' | wc -l | tr -d ' ')
        echo "  rendered SLX directories         : $SLX_COUNT"
        echo "  Skill overlay files (any case)   : $SKILL_COUNT"

        if [ "$SLX_COUNT" -eq 0 ]; then
          echo "❌ No rendered SLX directories produced"
          find output -maxdepth 5 -type d | sed 's/^/    /'
          exit 1
        fi

        # Ask GitHub how many Skill markdown files exist on the branch we just
        # rendered against, matching the filename case-insensitively (codebundles
        # can publish it as SKILL.md, Skill.md, or skill.md). Limit the count to
        # entries at codebundles/<bundle>/<skill>.md at the bundle root —
        # sub-directory matches don't trigger the overlay.
        UPSTREAM_SKILL_COUNT=0
        TREE_JSON=$(curl -fsSL "https://api.github.com/repos/runwhen-contrib/rw-cli-codecollection/git/trees/${SKILL_BRANCH}?recursive=1" 2>/dev/null || true)
        if [ -n "$TREE_JSON" ]; then
          UPSTREAM_SKILL_COUNT=$(printf '%s' "$TREE_JSON" \
            | python3 -c 'import json,sys; t=json.load(sys.stdin); paths=[e["path"] for e in t.get("tree",[]) if e.get("type")=="blob"]; print(sum(1 for p in paths if p.startswith("codebundles/") and p.lower().endswith("/skill.md") and p.count("/")==2))' \
            2>/dev/null || echo 0)
        fi
        echo "  upstream codebundles with Skill markdown (branch ${SKILL_BRANCH}) : ${UPSTREAM_SKILL_COUNT}"

        if [ "$UPSTREAM_SKILL_COUNT" -eq 0 ]; then
          echo ""
          echo "ℹ️  No codebundle on branch '${SKILL_BRANCH}' ships a Skill markdown yet."
          echo "    The overlay code path is exercised but produced 0 files (expected)."
          echo "    This task will auto-tighten once a SKILL.md / Skill.md is added upstream."
          echo "    For end-to-end coverage of the overlay code path itself, see"
          echo "    src/renderers/test_skill_overlay.py (unit tests)."
          echo ""
          echo "✔ Skill overlay pipeline ran cleanly (no upstream sources to overlay)"
          exit 0
        fi

        if [ "$SKILL_COUNT" -eq 0 ]; then
          echo "❌ Branch '${SKILL_BRANCH}' has ${UPSTREAM_SKILL_COUNT} codebundle Skill markdown file(s),"
          echo "   but none were overlaid onto rendered SLXs. Investigate _emit_skill_overlay."
          find output -type f -path '*/slxs/*' | head -n 30 | sed 's/^/    /'
          exit 1
        fi

        echo ""
        echo "  sample Skill overlay (first 12 lines):"
        SAMPLE=$(find output -type f -iname 'skill.md' -path '*/slxs/*' | head -n 1)
        echo "    -> $SAMPLE"
        sed 's/^/    /' "$SAMPLE" | head -n 12 || true

        echo ""
        echo "=== SQLite skill-artifact validation ==="
        DB_FILE=$(find output -maxdepth 3 -name 'resources.sqlite' | head -n 1)
        if [ -z "$DB_FILE" ]; then
          echo "❌ resources.sqlite not produced"
          exit 1
        fi

        if command -v sqlite3 >/dev/null; then
          SKILL_ROWS=$(sqlite3 "$DB_FILE" "SELECT COUNT(*) FROM workspace_artifacts WHERE artifact_kind='skill';")
          SAMPLE_ROW=$(sqlite3 "$DB_FILE" "SELECT relative_path FROM workspace_artifacts WHERE artifact_kind='skill' LIMIT 1;")
          echo "  skill artifacts : $SKILL_ROWS"
          echo "  sample row      : ${SAMPLE_ROW:-(none)}"
          if [ "$SKILL_ROWS" -eq 0 ]; then
            echo "❌ Skill.md present on disk but not classified as artifact_kind='skill' in SQLite"
            exit 1
          fi
        else
          python3 - "$DB_FILE" <<'PY' || exit 1
        import sqlite3, sys
        conn = sqlite3.connect(sys.argv[1])
        rows = conn.execute("SELECT COUNT(*) FROM workspace_artifacts WHERE artifact_kind='skill'").fetchone()[0]
        sample = conn.execute("SELECT relative_path FROM workspace_artifacts WHERE artifact_kind='skill' LIMIT 1").fetchone()
        print(f"  skill artifacts : {rows}")
        print(f"  sample row      : {sample[0] if sample else '(none)'}")
        if rows == 0:
            print("❌ Skill.md present on disk but not classified as artifact_kind='skill' in SQLite")
            sys.exit(1)
        PY
        fi

        echo "✔ Skill.md overlay rendered and persisted as artifact_kind='skill'"
    silent: false
