metadata:
  description: >-
    Manual overrides applied by sync_aws_resource_type_registry.py. Edit by hand,
    then re-run the sync script to regenerate
    src/indexers/aws_resource_type_registry.yaml.

    The registry maps every CloudQuery AWS plugin table to its AWS Cloud Control
    API resource type -- the CloudFormation resource type name
    (``AWS::<Service>::<Entity>``, e.g. ``AWS::EC2::Instance``) -- plus metadata
    used by the native ``awsapi`` indexer. The CloudFormation (CFN) type is the
    join key for generic discovery via the Cloud Control API
    (``cloudcontrol`` boto3 client, ``list_resources`` / ``get_resource``),
    exactly like ARM types are for Azure and Cloud Asset Inventory asset types
    are for GCP.

# ---------------------------------------------------------------------------
# service_cfn_names
#   Maps the CloudQuery service token (the ``<service>`` in
#   ``aws_<service>_<entity>``) to the CloudFormation *service* segment used in
#   the CFN resource type name. Many AWS services are irregular acronyms
#   (EC2, S3, RDS) or PascalCase brand names (CloudFront, DynamoDB) that the
#   plain capitalisation heuristic gets wrong, so pin them here. When a token
#   is absent the heuristic falls back to ``token.capitalize()``.
# ---------------------------------------------------------------------------
service_cfn_names:
  # --- acronym services (all-caps) ---
  ec2: EC2
  s3: S3
  rds: RDS
  iam: IAM
  eks: EKS
  ecs: ECS
  ecr: ECR
