{# Skip rendering when the test config didn't supply an "slo" subdict for
   this SLX. Trigger a deliberate Jinja error so render_output_items
   classifies this template as skipped (and the file is never written). #}
{% if not match_resource.slo %}{% set _skip = (1 / 0) %}{% endif %}
apiVersion: runwhen.com/v1
kind: ServiceLevelObjective
metadata:
  name: {{ full_slx_name }}
  labels:
    codeCollection: {{ match_resource.code_collection }}
    codeBundle: {{ match_resource.code_bundle }}
spec: {{ match_resource.slo | tojson }}
