    - name: platform
      value: aws
    - name: account_id
      value: '{{ match_resource.account_id | string }}'
    - name: account_name
      value: '{{ match_resource.account_name | string }}'
    - name: region
      value: '{{ match_resource.region | string }}'
    - name: service
      value: '{{ match_resource.service | string }}'
    - name: resource_type
      value: '{{ match_resource.resource_type.name | string }}'
{% if qualifiers and qualifiers.values() | list | length > 0 %}
{% set _first_qual = qualifiers.values() | list | first %}
    - name: resource_name
      value: '{{ _first_qual | string }}'
{% elif match_resource.name is defined %}
    - name: resource_name
      value: '{{ match_resource.name | string }}'
{% endif %}
{% set _resource_name_value = ((qualifiers.values() | list | first) if qualifiers and qualifiers.values() | list | length > 0 else (match_resource.name if match_resource.name is defined else '')) | default('') | string | replace(":", "_") | replace("/", "_") %}
{% for cr in child_resource_names | default([]) %}
{% set _cr_value = cr | string | replace(":", "_") | replace("/", "_") %}
{% if _cr_value != _resource_name_value %}
    - name: child_resource
      value: '{{ _cr_value }}'
{% endif %}
{% endfor %}
{% if match_resource.is_public is defined %}
    - name: is_public
      value: '{{ match_resource.is_public | string | lower }}'
{% endif %}
{% if match_resource.arn is defined %}
    - name: arn
      value: '{{ match_resource.arn | string | replace(":", "_") }}'
{% endif %}
{% set tags = match_resource.tags %}
{% if tags %}
{% for k, v in match_resource.tags.items() %}
    {% if v and v|string|trim != "" %}
    - name: "[aws]{{ k | string }}"
      value: '{{ v | string }}'
    {% endif %}
{% endfor %}
{% endif %} 

