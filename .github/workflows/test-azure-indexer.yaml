# Smoke-test the native azureapi indexer end-to-end against a small,
# AKS-free Azure fixture. Provisions a couple of resource groups + storage
# accounts + a key vault via Terraform (local state, single job), runs the
# baseline / selective / tag-filter discovery tasks, and tears the infra
# back down. Designed to be cheap so we can run it on every PR that
# touches src/** or the fixture.
name: Discovery Azure Indexer Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - ".test/azure/no-aks-resources/**"
      - ".github/workflows/test-azure-indexer.yaml"
      - "!src/VERSION"

permissions:
  contents: "read"
  id-token: "write"
  actions: "read"

env:
  TF_IN_AUTOMATION: "true"

jobs:
  azureapi-no-aks-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: .test/azure/no-aks-resources
    steps:
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Create buildx builder
        run: |
          docker buildx create --use --name=mybuilder
          docker buildx inspect --bootstrap

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZ_SANDBOX_CREDS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write terraform/tf.secret from sandbox credentials
        run: |
          set -euo pipefail
          echo '${{ secrets.AZ_SANDBOX_CREDS }}' > /tmp/azure_creds.json
          AZ_CLIENT_ID=$(jq -r '.clientId' /tmp/azure_creds.json)
          AZ_CLIENT_SECRET=$(jq -r '.clientSecret' /tmp/azure_creds.json)
          AZ_SUB_ID=$(jq -r '.subscriptionId' /tmp/azure_creds.json)
          AZ_TENANT_ID=$(jq -r '.tenantId' /tmp/azure_creds.json)
          SP_PRINCIPAL_ID=$(az ad sp list \
            --filter "appId eq '$AZ_CLIENT_ID'" \
            --query '[0].id' -o tsv)

          cat > terraform/tf.secret <<EOF
          export TF_VAR_subscription_id='$AZ_SUB_ID'
          export TF_VAR_subscription_id_1='$AZ_SUB_ID'
          export TF_VAR_subscription_id_2='$AZ_SUB_ID'
          export AZ_TENANT_ID='$AZ_TENANT_ID'
          export TF_VAR_tenant_id='$AZ_TENANT_ID'
          export AZ_CLIENT_ID='$AZ_CLIENT_ID'
          export AZ_CLIENT_SECRET='$AZ_CLIENT_SECRET'
          export ARM_SUBSCRIPTION_ID='$AZ_SUB_ID'
          export ARM_CLIENT_ID='$AZ_CLIENT_ID'
          export ARM_CLIENT_SECRET='$AZ_CLIENT_SECRET'
          export ARM_TENANT_ID='$AZ_TENANT_ID'
          export TF_VAR_sp_principal_id='$SP_PRINCIPAL_ID'
          EOF
          rm /tmp/azure_creds.json

      - name: Apply terraform infrastructure
        run: task build-infra

      - name: Run baseline discovery (defaultLOD=detailed, every resource indexed)
        run: task ci-test-azureapi-baseline

      - name: Run selective discovery (drop-rg LOD=none, must NOT appear)
        run: task ci-test-azureapi-selective

      - name: Run tag-filter discovery (excludeTags drops out-of-scope resources)
        run: task ci-test-azureapi-tag-filter

      - name: Upload discovery artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: no-aks-azureapi-logs-${{ github.run_id }}
          path: |
            .test/azure/no-aks-resources/output/
            .test/azure/no-aks-resources/run_sh_output.log
          retention-days: 7

      - name: Destroy terraform infrastructure
        if: always()
        run: task check-and-cleanup-terraform

  notify:
    runs-on: ubuntu-latest
    needs: [azureapi-no-aks-test]
    if: always()
    steps:
      - name: Set Workflow Status
        id: status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "status=❌ *Failure*" >> $GITHUB_ENV
          else
            echo "status=✅ *Success*" >> $GITHUB_ENV
          fi

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: "#runwhen-local"
          slack-message: "${{ env.status }} - Workflow *${{ github.workflow }}* in repo *${{ github.repository }}* on branch *${{ github.ref_name }}*.\nSee the run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
