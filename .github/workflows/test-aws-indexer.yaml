# Smoke-test the native awsapi indexer end-to-end against a static AWS sandbox
# account. Like the GCP fixture there is no Terraform: the sandbox account
# already exists, so the job just writes the credentials, builds the RWL test
# image, runs discovery with awsIndexerBackend=awsapi + the SQLite resource
# store, and asserts the persisted resources directly. Designed to be cheap so
# we can run it on every PR that touches src/** or the fixture.
#
# Required repo/org secrets:
#   AWS_ACCESS_KEY_ID     - the sandbox IAM user's access key id.
#   AWS_SECRET_ACCESS_KEY - the sandbox IAM user's secret access key.
# (Same secrets already used by .github/workflows/test-aws-auth.yaml.)
name: Discovery AWS Indexer Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - ".test/aws/awsapi-baseline/**"
      - ".github/workflows/test-aws-indexer.yaml"
      - "!src/VERSION"

permissions:
  contents: "read"
  id-token: "write"
  actions: "read"

jobs:
  awsapi-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: .test/aws/awsapi-baseline
    steps:
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Create buildx builder
        run: |
          docker buildx create --use --name=mybuilder
          docker buildx inspect --bootstrap

      - name: Write aws.secret from sandbox credentials
        run: |
          set -euo pipefail
          # Credentials come from repo secrets; nothing is committed or echoed.
          cat > aws.secret <<EOF
          export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          export AWS_DEFAULT_REGION=us-west-2
          EOF
          # Sanity-check the file has the expected keys (never echo the values).
          grep -q '^export AWS_ACCESS_KEY_ID=.\+' aws.secret \
            && grep -q '^export AWS_SECRET_ACCESS_KEY=.\+' aws.secret \
            && echo "aws.secret OK (region us-west-2)"

      - name: Run baseline discovery (awsIndexerBackend=awsapi, SQLite store assertions)
        run: task ci-test-awsapi-baseline

      - name: Upload discovery artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: awsapi-logs-${{ github.run_id }}
          path: |
            .test/aws/awsapi-baseline/output/
            .test/aws/awsapi-baseline/run_sh_output.log
            .test/aws/awsapi-baseline/container_logs.log
          retention-days: 7

      - name: Remove aws.secret
        if: always()
        run: rm -f aws.secret

  notify:
    runs-on: ubuntu-latest
    needs: [awsapi-test]
    if: always()
    steps:
      - name: Set Workflow Status
        id: status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "status=❌ *Failure*" >> $GITHUB_ENV
          else
            echo "status=✅ *Success*" >> $GITHUB_ENV
          fi

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: "#runwhen-local"
          slack-message: "${{ env.status }} - Workflow *${{ github.workflow }}* in repo *${{ github.repository }}* on branch *${{ github.ref_name }}*.\nSee the run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
