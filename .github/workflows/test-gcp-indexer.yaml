# Smoke-test the native gcpapi indexer end-to-end against a static GCP
# sandbox project. Unlike the Azure fixture there is no Terraform: the sandbox
# project (a GKE cluster + a handful of storage buckets) already exists, so the
# job just writes the service-account credentials, builds the RWL test image,
# runs discovery with gcpIndexerBackend=gcpapi + the SQLite resource store, and
# asserts the persisted resources directly. Designed to be cheap so we can run
# it on every PR that touches src/** or the fixture.
#
# Required repo/org secret:
#   GCP_SANDBOX_SA_JSON - the raw, single-line service-account key JSON for the
#                         sandbox SA (project_id is read back out of it by the
#                         Taskfile).
#
# Required cloud-side setup on the sandbox service account (per-service viewer
# roles — this is the supported functional baseline for native GCP discovery):
#   * roles/compute.viewer, roles/storage.objectViewer, roles/container.viewer,
#     roles/pubsub.viewer, roles/iam.serviceAccountViewer (or a convenience
#     superset like roles/viewer). These gate the typed SDK collectors that the
#     baseline asserts (project anchor, storage buckets, GKE clusters, and the
#     always-present default compute network / firewall rules).
#
# OPTIONAL accelerator (NOT required; CI passes without it):
#   * Enabling the Cloud Asset Inventory API (cloudasset.googleapis.com) with a
#     CAI viewer role broadens coverage to resource types that have no typed
#     collector. Its absence is normal: the indexer logs an informational
#     GCP_CAI_PERMISSION_DENIED note and discovery proceeds on the typed
#     collectors. The baseline assert does NOT fail when CAI is unavailable.
name: Discovery GCP Indexer Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - ".test/gcp/gcp-and-k8s/**"
      - ".github/workflows/test-gcp-indexer.yaml"
      - "!src/VERSION"

permissions:
  contents: "read"
  id-token: "write"
  actions: "read"

jobs:
  gcpapi-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: .test/gcp/gcp-and-k8s
    steps:
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Create buildx builder
        run: |
          docker buildx create --use --name=mybuilder
          docker buildx inspect --bootstrap

      - name: Write gcp.secret from sandbox service-account JSON
        run: |
          set -euo pipefail
          # The SA JSON is committed nowhere; it comes from the repo secret.
          # Single-quote wrapping is safe because service-account JSON never
          # contains single quotes.
          echo '${{ secrets.GCP_SANDBOX_SA_JSON }}' > gcp.secret
          # Sanity-check it parses and never echo the key material.
          python3 -c "import json; d=json.load(open('gcp.secret')); assert d.get('project_id'); print('gcp.secret OK for project', d['project_id'])"

      - name: Run baseline discovery (gcpIndexerBackend=gcpapi, SQLite store assertions)
        run: task ci-test-gcpapi-baseline

      - name: Upload discovery artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gcpapi-logs-${{ github.run_id }}
          path: |
            .test/gcp/gcp-and-k8s/output/
            .test/gcp/gcp-and-k8s/run_sh_output.log
            .test/gcp/gcp-and-k8s/container_logs.log
          retention-days: 7

      - name: Remove gcp.secret
        if: always()
        run: rm -f gcp.secret

  notify:
    runs-on: ubuntu-latest
    needs: [gcpapi-test]
    if: always()
    steps:
      - name: Set Workflow Status
        id: status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "status=❌ *Failure*" >> $GITHUB_ENV
          else
            echo "status=✅ *Success*" >> $GITHUB_ENV
          fi

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: "#runwhen-local"
          slack-message: "${{ env.status }} - Workflow *${{ github.workflow }}* in repo *${{ github.repository }}* on branch *${{ github.ref_name }}*.\nSee the run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
