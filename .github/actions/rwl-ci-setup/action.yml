name: "RWL CI setup"
description: >-
  Shared setup for the RunWhen Local cloud-indexer CI jobs: install Task,
  set up Docker Buildx, and create the "mybuilder" buildx builder that the
  Taskfile build-rwl targets expect.

# NOTE: actions/checkout is intentionally NOT part of this composite action.
# GitHub resolves a *local* composite action (uses: ./.github/actions/...)
# from the already-checked-out workspace, so the repository must be checked
# out by a job-level `actions/checkout` step BEFORE this action can be
# referenced. Each job therefore runs `actions/checkout@v4` first and then
# calls this action for the remaining (identical) setup.

runs:
  using: "composite"
  steps:
    - name: Install Task
      uses: arduino/setup-task@v2
      with:
        version: 3.x
        repo-token: ${{ github.token }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        install: true

    - name: Create buildx builder
      shell: bash
      run: |
        # Idempotent: reuse the builder if a previous step/run already made it.
        docker buildx create --use --name=mybuilder 2>/dev/null \
          || docker buildx use mybuilder
        docker buildx inspect --bootstrap
